<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Digest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5e6d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Masthead ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    .masthead-rule {
      border: none;
      border-top: 4px double #b85c1a;
      margin-bottom: 0.8rem;
    }

    header h1 {
      font-size: 3rem;
      color: #1a0a00;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.05;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      color: #7a4010;
      font-style: italic;
      letter-spacing: 0.04em;
    }

    .masthead-rule-bottom {
      border: none;
      border-top: 1.5px solid #c8885a;
      margin-top: 0.8rem;
    }

    /* ── Card ── */
    .card {
      background: #fff8ef;
      border: 1.5px solid #dbb98a;
      border-radius: 4px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(100, 50, 10, 0.12);
    }

    label[for="topic"] {
      display: block;
      font-size: 0.75rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #b85c1a;
      margin-bottom: 0.4rem;
    }

    #topic {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1.15rem;
      font-family: Georgia, serif;
      border: 1.5px solid #c8885a;
      border-radius: 4px;
      background: #fdf3e7;
      color: #1a0a00;
      outline: none;
      margin-bottom: 1.2rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #topic::placeholder {
      color: #b89070;
      font-style: italic;
    }

    #topic:focus {
      border-color: #b85c1a;
      box-shadow: 0 0 0 3px rgba(184, 92, 26, 0.18);
    }

    /* ── Custom checkbox ── */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1.2rem;
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 1.15rem;
      height: 1.15rem;
      border: 1.5px solid #b85c1a;
      border-radius: 3px;
      background: #fdf3e7;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }

    .checkbox-row input[type="checkbox"]:checked {
      background: #b85c1a;
      border-color: #b85c1a;
    }

    .checkbox-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .checkbox-row input[type="checkbox"]:focus-visible {
      outline: 2px solid #b85c1a;
      outline-offset: 2px;
    }

    .checkbox-row span {
      font-size: 0.88rem;
      font-family: system-ui, sans-serif;
      color: #5c3010;
      user-select: none;
      line-height: 1.3;
    }

    /* ── Button ── */
    #run-btn {
      width: 100%;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #b85c1a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.15s, transform 0.1s;
    }

    #run-btn:hover:not(:disabled) {
      background: #8f4412;
      transform: translateY(-1px);
    }

    #run-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #run-btn:focus-visible {
      outline: 2px solid #b85c1a;
      outline-offset: 3px;
    }

    #run-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    #run-btn:disabled::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.28) 50%,
        transparent 100%
      );
      animation: shimmer 1.4s ease-in-out infinite;
    }

    /* ── Status line ── */
    #status {
      margin-top: 1.1rem;
      font-size: 0.95rem;
      font-family: system-ui, sans-serif;
      text-align: center;
      min-height: 1.4em;
      color: #7a4010;
    }

    #status.success { color: #2e6b1a; font-weight: 600; }
    #status.error   { color: #c0200e; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <hr class="masthead-rule" />
    <h1>News Digest</h1>
    <p>Powered by Claude AI &amp; live web search</p>
    <hr class="masthead-rule-bottom" />
  </header>

  <div class="card">
    <label for="topic">Topic</label>
    <input id="topic" type="text" placeholder="e.g. Climate Change, AI, Finance…" />
    <label class="checkbox-row" for="ping-only">
      <input type="checkbox" id="ping-only" />
      <span>Test Discord connection only (no AI call)</span>
    </label>
    <button id="run-btn">Generate Digest</button>
    <div id="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
