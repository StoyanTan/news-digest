<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Digest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fdf6ee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Masthead ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    .masthead-rule {
      border: none;
      border-top: 3px double #c87941;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-size: 2.4rem;
      color: #3b1f0a;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    header p {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: #9c6e4a;
      font-style: italic;
      letter-spacing: 0.03em;
    }

    .masthead-rule-bottom {
      border: none;
      border-top: 1px solid #d4b896;
      margin-top: 0.75rem;
    }

    /* ── Card ── */
    .card {
      background: #fffaf4;
      border: 1px solid #e8d5be;
      border-radius: 4px;
      padding: 1.75rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(120, 70, 20, 0.08);
    }

    label[for="topic"] {
      display: block;
      font-size: 0.72rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9c6e4a;
      margin-bottom: 0.35rem;
    }

    #topic {
      width: 100%;
      padding: 0.6rem 0.9rem;
      font-size: 1rem;
      font-family: Georgia, serif;
      border: 1px solid #d4b896;
      border-radius: 4px;
      background: #fdf6ee;
      color: #3b1f0a;
      outline: none;
      margin-bottom: 1.1rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #topic:focus {
      border-color: #c87941;
      box-shadow: 0 0 0 3px rgba(200, 121, 65, 0.12);
    }

    /* ── Custom checkbox ── */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 1.1rem;
      height: 1.1rem;
      border: 1.5px solid #c4956a;
      border-radius: 3px;
      background: #fdf6ee;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }

    .checkbox-row input[type="checkbox"]:checked {
      background: #c87941;
      border-color: #c87941;
    }

    .checkbox-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .checkbox-row input[type="checkbox"]:focus-visible {
      outline: 2px solid #c87941;
      outline-offset: 2px;
    }

    .checkbox-row span {
      font-size: 0.82rem;
      font-family: system-ui, sans-serif;
      color: #7a5535;
      user-select: none;
      line-height: 1.3;
    }

    /* ── Button ── */
    #run-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.9rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #c87941;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.15s, opacity 0.2s;
    }

    #run-btn:hover:not(:disabled) { background: #a85e2e; }

    #run-btn:focus-visible {
      outline: 2px solid #c87941;
      outline-offset: 3px;
    }

    #run-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Shimmer sweep while loading */
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    #run-btn:disabled::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.25) 50%,
        transparent 100%
      );
      animation: shimmer 1.4s ease-in-out infinite;
    }

    /* ── Status line ── */
    #status {
      margin-top: 1rem;
      font-size: 0.88rem;
      font-family: system-ui, sans-serif;
      text-align: center;
      min-height: 1.4em;
      color: #9c6e4a;
      transition: color 0.2s;
    }

    #status.success { color: #4e7233; font-weight: 600; }
    #status.error   { color: #b03a2e; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <hr class="masthead-rule" />
    <h1>News Digest</h1>
    <p>Powered by Claude AI &amp; live web search</p>
    <hr class="masthead-rule-bottom" />
  </header>

  <div class="card">
    <label for="topic">Topic</label>
    <input id="topic" type="text" value="Technology" placeholder="e.g. Climate Change" />
    <label class="checkbox-row" for="ping-only">
      <input type="checkbox" id="ping-only" />
      <span>Test Discord connection only (no AI call)</span>
    </label>
    <button id="run-btn">Generate Digest</button>
    <div id="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
