services:
  - type: web
    name: news-digest
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GMAIL_EMAIL
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: daily-digest-cron
    runtime: node
    plan: free
    schedule: "0 9 * * *"
    buildCommand: npm install
    startCommand: npx tsx daily.ts
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_EMAIL
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
